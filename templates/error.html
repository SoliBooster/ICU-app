{% extends "base.html" %}
{% block title %}错误 - {{ site_name }}{% endblock %}
{% block topbar_title %}<h1>出错了</h1>{% endblock %}
{% block content %}
<div class="error-box">
    <div class="error-code">{{ code | default(500) }}</div>
    <p>{{ message | default('发生未知错误') }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">返回首页</a>
</div>
{% endblock %}
